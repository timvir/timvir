name: Deployment Verification

on: deployment_status

env:
  URNERYS: app.urnerys.dev
  BUILD: "github-run-${{ github.run_id }}-${{ github.run_attempt }}"

permissions:
  contents: read

jobs:
  vst:
    name: Visual Smoke Test
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.14.0

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.1.1

      - run: pnpm install
      - run: ./node_modules/.bin/playwright install --with-deps chromium webkit

      - run: ../node_modules/.bin/playwright test
        working-directory: vst
        env:
          URL: ${{ github.event.deployment_status.target_url }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment_status.environment }}
