name: Validate

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
      - run: nix run .#nix-develop .#workflow
      - run: pnpm install

      - run: ./node_modules/.bin/next typegen
      - run: ./node_modules/.bin/tsc --build tsconfig.json
      - run: ./node_modules/.bin/tsc --build tsconfig.build.json
      - run: ./node_modules/.bin/rollup -c config/rollup.config.js

      - run: node --test
        working-directory: pkg/mdx
